name: Update JuniorLeague data

on:
  schedule:
    - cron: "15 * * * *"   # כל שעה ב-XX:15 (UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scripts/scrape_juniorleague.py

      - name: Commit & push if changed
        run: |
          git config user.name "toplevel-bot"
          git config user.email "toplevel-bot@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || (git commit -m "Update data" && git push)
